<html lang="en">
     <head>
          <meta charset="UTF-8" />
          <meta
               name="viewport"
               content="width=device-width, initial-scale=1.0"
          />
          <title>RPS</title>
          <link rel="stylesheet" href="rps.css" />
     </head>
     <body>
          <h1>THE ROCK PAPER SCISSOR.</h1>
          <div class="choice">
               <div id="rock" class="divs">
                    <img src="rock.png" />
               </div>
               <div id="paper" class="divs">
                    <img src="paper.png" />
               </div>
               <div id="scissor" class="divs">
                    <img src="scissor.png" />
               </div>
          </div>
          <div class="score-board">
               <div class="score">
                    <p id="user-score">0</p>
                    <p>YOU</p>
               </div>
               <div class="score">
                    <p id="comp-score">0</p>
                    <p>COMPUTER</p>
               </div>
          </div>
          <div class="msg-container">
               <p id="msg">Play your move</p>
          </div>
          <script src="rps.js"></script>
     </body>
</html>
